{{ define "main" }}
<article class="single-page">
    <div style="max-width: 720px; margin: 0 auto; padding: 3rem 2rem 0; text-align: center;">
        {{ if .Date }}
        <time class="date" style="display: block; font-family: 'Inter', system-ui, sans-serif; font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 1rem;">{{ .Date.Format "January 2, 2006" }}</time>
        {{ end }}
        {{ if .Params.tags }}
        <div class="tags" style="margin-bottom: 2rem;">
            {{ range .Params.tags }}
            <span class="tag">{{ . }}</span>
            {{ end }}
        </div>
        {{ end }}
    </div>

    <div class="page-content">
        {{ .Content }}
    </div>

    <footer class="page-footer" style="max-width: 720px; margin: 0 auto; padding: 0 2rem;">
        <a href="{{ "/" | relURL }}" class="back-link">&larr; Back to home</a>
    </footer>
</article>
{{ end }}
